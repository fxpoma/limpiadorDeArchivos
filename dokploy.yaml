name: Limpiador de Archivos
id: limpiador-de-archivos

version: 1.0.0

services:
  web:
    build:
      dockerfile: ./Dockerfile
      context: ./
      method: docker
    image: limpiador-archivos:latest
    ports:
      - target: 5000
        published: 5000
        protocol: tcp
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - FLASK_RUN_PORT=5000
      - FLASK_DEBUG=false
    volumes:
      # Volumen con nombre para persistir la base de datos y backups
      - limpiador-db:/app/data
      # Montar solo los directorios de datos, no todo static
      # Esto evita sobrescribir los archivos CSS/JS del build
      - limpiador-uploads:/app/static/uploads
      - limpiador-codes:/app/static/codes
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      command: /start.sh

# Volúmenes con nombre para persistencia de datos
volumes:
  limpiador-db:
    driver: local
  limpiador-uploads:
    driver: local
  limpiador-codes:
    driver: local
