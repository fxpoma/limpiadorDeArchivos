name: Limpiador de Archivos
id: limpiador-de-archivos

version: 1.0.0

services:
  web:
    build:
      dockerfile: ./Dockerfile
      context: ./
      method: docker
    image: limpiador-archivos:latest
    ports:
      - target: 5000
        published: 5000
        protocol: tcp
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - FLASK_RUN_PORT=5000
      - FLASK_DEBUG=false
    volumes:
      # Volumen con nombre para persistir la base de datos
      - limpiador-db:/app/data
      # Archivos estáticos
      - ./static:/app/static
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      command: /start.sh

# Volúmenes con nombre para persistencia de datos
volumes:
  limpiador-db:
    driver: local
