name: Limpiador de Archivos
id: limpiador-de-archivos

version: 1.0.0

services:
  web:
    image: limpiador-archivos:latest
    build:
      dockerfile: ./Dockerfile
      context: ./
    ports:
      - target: 5000
        published: 5000
        protocol: tcp
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - FLASK_RUN_PORT=5000
      - FLASK_DEBUG=false
    volumes:
      - ./database.db:/app/database.db
      - ./static:/app/static
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
