{% extends "base.html" %}

{% block title %}Editar Usuario - Limpiador de Archivos{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-lg">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">Editar Usuario</h2>
                <form method="POST" action="{{ url_for('edit_user', user_id=user.id) }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">Nombre de Usuario</label>
                        <input type="text" class="form-control" id="username" name="username" value="{{ user.username }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Correo Electrónico</label>
                        <input type="email" class="form-control" id="email" name="email" value="{{ user.email }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="new_password" class="form-label">Nueva Contraseña (dejar en blanco para mantener la actual)</label>
                        <input type="password" class="form-control" id="new_password" name="new_password">
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="is_admin" name="is_admin" {% if user.is_admin == 1 %}checked{% endif %}>
                        <label class="form-check-label" for="is_admin">Es Administrador</label>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-success">Guardar Cambios</button>
                    </div>
                </form>
                <div class="text-center mt-3">
                    <a href="{{ url_for('admin_users.admin_users') }}">Volver a Usuarios</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
